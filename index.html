  <style>
    :root {
      --bg: #0a0a0c;
      --bg-2: #0f0f13;
      --surface: rgba(255,255,255,0.025);
      --surface-2: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.14);
      --text: #ededf2;
      --muted: #9a9aa6;
      --faint: #6b6b76;
      --accent: #ffb454;
      --accent-2: #ffce8a;
      --accent-soft: rgba(255,180,84,0.12);
      --radius: 18px;
      --maxw: 1180px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
    }

    body {
      font-family: 'Manrope', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Atmospheric background: grid + radial glow + grain */
    body::before {
      content: "";
      position: fixed; inset: 0; z-index: -2;
      background:
        radial-gradient(900px 600px at 75% -10%, rgba(255,180,84,0.10), transparent 60%),
        radial-gradient(700px 500px at 0% 100%, rgba(120,160,255,0.05), transparent 55%),
        linear-gradient(180deg, var(--bg), var(--bg-2));
    }
    body::after {
      content: "";
      position: fixed; inset: 0; z-index: -1; pointer-events: none; opacity: .5;
      background-image:
        linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
      background-size: 64px 64px;
      mask-image: radial-gradient(ellipse 100% 70% at 50% 0%, #000 30%, transparent 85%);
    }

    .wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 24px; }
    h1,h2,h3,h4 { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700; line-height: 1.05; letter-spacing: -0.02em; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    a { color: inherit; text-decoration: none; }
    ::selection { background: var(--accent); color: #1a1205; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 11px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #26262d; border-radius: 10px; border: 3px solid var(--bg); }
    ::-webkit-scrollbar-thumb:hover { background: #36363f; }

    /* ===== NAV ===== */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      transition: transform .4s cubic-bezier(.4,0,.2,1), background .3s, border-color .3s, backdrop-filter .3s;
      border-bottom: 1px solid transparent;
    }
    .nav.hidden { transform: translateY(-100%); }
    .nav.scrolled {
      background: rgba(10,10,12,0.72);
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 72px; }
    .logo { font-family: 'Bricolage Grotesque'; font-weight: 800; font-size: 22px; letter-spacing: -.03em; display: flex; align-items: center; gap: 2px; }
    .logo .dot { color: var(--accent); }
    .nav-links { display: flex; align-items: center; gap: 4px; list-style: none; }
    .nav-links a {
      font-size: 14px; font-weight: 500; color: var(--muted);
      padding: 9px 14px; border-radius: 10px; position: relative; transition: color .25s, background .25s;
    }
    .nav-links a .idx { font-family:'JetBrains Mono'; font-size: 11px; color: var(--accent); margin-right: 6px; opacity:.7; }
    .nav-links a:hover { color: var(--text); background: var(--surface-2); }
    .nav-links a.active { color: var(--text); }
    .nav-links a.active::after {
      content:""; position:absolute; left:14px; right:14px; bottom:3px; height:2px; border-radius:2px;
      background: linear-gradient(90deg,var(--accent),var(--accent-2));
    }
    .nav-cta {
      font-size: 14px; font-weight: 600; padding: 9px 16px; border-radius: 10px;
      border: 1px solid var(--border-strong); color: var(--text); transition: all .25s;
      display:inline-flex; align-items:center; gap:8px;
    }
    .nav-cta:hover { background: var(--accent); color:#1a1205; border-color: var(--accent); }
    .burger { display: none; background: none; border: 1px solid var(--border); color: var(--text); width: 42px; height: 42px; border-radius: 11px; font-size: 18px; cursor: pointer; transition: background .2s; }
    .burger:hover { background: var(--surface-2); }

    .mobile-menu {
      position: fixed; inset: 0; z-index: 200; background: rgba(8,8,10,0.96);
      backdrop-filter: blur(12px); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
      opacity: 0; pointer-events: none; transition: opacity .3s;
    }
    .mobile-menu.open { opacity: 1; pointer-events: auto; }
    .mobile-menu a { font-family:'Bricolage Grotesque'; font-size: 30px; font-weight: 700; color: var(--muted); padding: 8px; transition: color .2s, transform .2s; }
    .mobile-menu a:hover { color: var(--accent); transform: translateX(6px); }
    .mobile-menu .mclose { position: absolute; top: 24px; right: 24px; font-size: 26px; background:none;border:none;color:var(--text);cursor:pointer; }

    /* ===== SECTION SHELL ===== */
    section { padding: 100px 0; position: relative; }
    .eyebrow { font-family:'JetBrains Mono'; font-size: 13px; letter-spacing: .18em; text-transform: uppercase; color: var(--accent); display:inline-flex; align-items:center; gap:10px; margin-bottom:18px; }
    .eyebrow::before { content:""; width: 28px; height:1px; background: var(--accent); display:inline-block; }
    .sec-title { font-size: clamp(32px, 5vw, 52px); margin-bottom: 14px; }
    .sec-sub { color: var(--muted); max-width: 640px; font-size: 17px; }

    /* reveal */
    .reveal { opacity: 0; transform: translateY(26px); transition: opacity .7s cubic-bezier(.16,1,.3,1), transform .7s cubic-bezier(.16,1,.3,1); }
    .reveal.in { opacity: 1; transform: none; }

    /* ===== HERO ===== */
    .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: stretch; padding-top: 90px; }
    .hero-grid { display: grid; grid-template-columns: 1.25fr .85fr; gap: 56px; align-items: center; width: 100%; }
    .avail { display:inline-flex; align-items:center; gap:9px; font-size:13px; font-family:'JetBrains Mono'; color: var(--muted); border:1px solid var(--border); background: var(--surface); padding:7px 14px; border-radius:999px; margin-bottom:26px; }
    .avail .ping { width:8px; height:8px; border-radius:50%; background:#3ddc84; box-shadow:0 0 0 0 rgba(61,220,132,.6); animation: ping 2s infinite; }
    @keyframes ping { 0%{box-shadow:0 0 0 0 rgba(61,220,132,.5);} 70%{box-shadow:0 0 0 9px rgba(61,220,132,0);} 100%{box-shadow:0 0 0 0 rgba(61,220,132,0);} }
    .hero h1 { font-size: clamp(40px, 7vw, 78px); margin-bottom: 10px; }
    .hero h1 .name { background: linear-gradient(120deg, #fff 20%, var(--accent-2) 60%, var(--accent)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .role-line { font-family:'Bricolage Grotesque'; font-weight:600; font-size: clamp(20px,3.4vw,34px); color: var(--text); min-height: 1.2em; margin-bottom: 22px; }
    .role-line .typed { color: var(--accent); }
    .role-line .caret { display:inline-block; width:3px; height:1em; background: var(--accent); margin-left:4px; transform: translateY(4px); animation: blink 1s steps(2) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .hero-desc { color: var(--muted); font-size: 17px; max-width: 540px; margin-bottom: 32px; }
    .hero-ctas { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 30px; }

    .btn { display:inline-flex; align-items:center; gap:10px; font-weight:600; font-size:15px; padding:13px 22px; border-radius:12px; cursor:pointer; transition: all .25s cubic-bezier(.4,0,.2,1); border:1px solid transparent; }
    .btn-primary { background: var(--accent); color:#1a1205; }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 12px 30px -10px rgba(255,180,84,.5); }
    .btn-ghost { background: var(--surface); border-color: var(--border-strong); color: var(--text); }
    .btn-ghost:hover { background: var(--surface-2); border-color: var(--accent); transform: translateY(-3px); }

    .socials { display:flex; gap:12px; }
    .socials a { width:44px; height:44px; display:grid; place-items:center; border:1px solid var(--border); border-radius:12px; color: var(--muted); font-size:18px; background: var(--surface); transition: all .25s; }
    .socials a:hover { color: var(--accent); border-color: var(--accent); transform: translateY(-3px); }

    /* hero card / avatar */
    .hero-card { position: relative; }
    .avatar-frame {
      position: relative; aspect-ratio: 1/1; border-radius: 24px; overflow: hidden;
      border: 1px solid var(--border-strong);
      background: linear-gradient(150deg, #15151a, #0d0d11);
      box-shadow: 0 40px 90px -40px rgba(0,0,0,.8);
    }
    .avatar-frame::after { content:""; position:absolute; inset:0; background: radial-gradient(120% 80% at 70% 0%, rgba(255,180,84,.16), transparent 55%); }
    .avatar-frame img { width:100%; height:100%; object-fit: cover; display:block; }
    .avatar-monogram { position:absolute; inset:0; display:grid; place-items:center; }
    .avatar-monogram span { font-family:'Bricolage Grotesque'; font-weight:800; font-size: 150px; background: linear-gradient(160deg,var(--accent-2),var(--accent)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color: transparent; opacity:.92; }
    .float-badge {
      position:absolute; background: rgba(15,15,19,.92); backdrop-filter: blur(8px);
      border:1px solid var(--border-strong); border-radius:14px; padding:12px 16px; display:flex; align-items:center; gap:10px;
      box-shadow: 0 18px 40px -18px rgba(0,0,0,.7); animation: floaty 5s ease-in-out infinite;
    }
    .float-badge i { color: var(--accent); font-size: 18px; }
    .float-badge b { font-family:'Bricolage Grotesque'; font-size:16px; }
    .float-badge small { display:block; color: var(--faint); font-size:11px; font-family:'JetBrains Mono'; }
    .fb-1 { top: 24px; left: -26px; }
    .fb-2 { bottom: 30px; right: -24px; animation-delay: 1.2s; }
    @keyframes floaty { 0%,100%{ transform: translateY(0);} 50%{ transform: translateY(-12px);} }

    /* stats strip */
    .stats { display:grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-top: 70px; border-top:1px solid var(--border); padding-top: 36px; }
    .stat .num { font-family:'Bricolage Grotesque'; font-weight:800; font-size: 38px; color: var(--text); }
    .stat .num span { color: var(--accent); }
    .stat .lbl { color: var(--muted); font-size: 14px; }

    /* ===== ABOUT ===== */
    .about-grid { display:grid; grid-template-columns: 1.3fr 1fr; gap: 40px; margin-top: 50px; }
    .card { background: var(--surface); border:1px solid var(--border); border-radius: var(--radius); padding: 30px; transition: border-color .3s, transform .3s, background .3s; }
    .card:hover { border-color: var(--border-strong); }
    .about-lead { font-size: 19px; line-height: 1.7; color: #d6d6de; }
    .about-lead b { color: var(--text); }
    .pill-row { display:flex; flex-wrap:wrap; gap:10px; margin-top:24px; }
    .pill { font-family:'JetBrains Mono'; font-size:12.5px; color: var(--accent); background: var(--accent-soft); border:1px solid rgba(255,180,84,.25); padding:6px 12px; border-radius:999px; }
    .edu-item { padding: 18px 0; border-bottom: 1px solid var(--border); }
    .edu-item:last-child { border-bottom: none; padding-bottom: 0; }
    .edu-item h4 { font-size: 17px; margin-bottom: 4px; }
    .edu-item .where { color: var(--muted); font-size: 14px; }
    .edu-item .meta { display:flex; justify-content:space-between; margin-top:6px; font-family:'JetBrains Mono'; font-size:12px; color: var(--faint); }
    .edu-item .meta b { color: var(--accent); }

    /* expertise cards */
    .expertise { display:grid; grid-template-columns: repeat(4,1fr); gap:18px; margin-top: 26px; }
    .exp-card { text-align:left; }
    .exp-card .ico { width:48px;height:48px;border-radius:13px; display:grid;place-items:center; background: var(--accent-soft); color:var(--accent); font-size:20px; margin-bottom:16px; border:1px solid rgba(255,180,84,.2); }
    .exp-card h4 { font-size:17px; margin-bottom:8px; }
    .exp-card p { color: var(--muted); font-size: 14px; }

    /* ===== EXPERIENCE TIMELINE ===== */
    .timeline { margin-top: 50px; position: relative; padding-left: 34px; }
    .timeline::before { content:""; position:absolute; left:7px; top:8px; bottom:8px; width:2px; background: linear-gradient(var(--accent), transparent); }
    .tl-item { position: relative; padding-bottom: 44px; }
    .tl-item:last-child { padding-bottom: 0; }
    .tl-item::before { content:""; position:absolute; left:-34px; top:6px; width:16px; height:16px; border-radius:50%; background: var(--bg); border:3px solid var(--accent); }
    .tl-item.cur::before { box-shadow: 0 0 0 5px var(--accent-soft); }
    .tl-head { display:flex; flex-wrap:wrap; align-items:center; gap:10px; margin-bottom:6px; }
    .tl-head h3 { font-size: 21px; }
    .tl-tag { font-family:'JetBrains Mono'; font-size:11px; color: var(--accent); border:1px solid rgba(255,180,84,.3); padding:3px 9px; border-radius:999px; }
    .tl-co { color: var(--accent-2); font-weight:600; font-size:15px; }
    .tl-date { font-family:'JetBrains Mono'; font-size: 12.5px; color: var(--faint); margin: 4px 0 14px; }
    .tl-list { list-style:none; display:grid; gap:9px; }
    .tl-list li { color: var(--muted); font-size: 15px; padding-left: 22px; position: relative; }
    .tl-list li::before { content:"▹"; position:absolute; left:0; color: var(--accent); }

    /* ===== SKILLS ===== */
    .skill-cats { display:grid; grid-template-columns: repeat(2,1fr); gap:18px; margin-top: 50px; }
    .skill-cat h4 { font-size: 16px; margin-bottom: 18px; display:flex; align-items:center; gap:10px; }
    .skill-cat h4 i { color: var(--accent); }
    .chips { display:flex; flex-wrap:wrap; gap:10px; }
    .chip { display:inline-flex; align-items:center; gap:9px; font-size:14px; font-weight:500; padding:9px 14px; border-radius:11px; background: var(--surface-2); border:1px solid var(--border); transition: all .25s; cursor: default; }
    .chip:hover { border-color: var(--accent); transform: translateY(-3px); background: rgba(255,180,84,.06); }
    .chip i, .chip .di { font-size:18px; }
    .chip .di { color: var(--text); } /* devicons that are dark -> light */

    /* ===== PROJECTS ===== */
    .proj-grid { display:grid; grid-template-columns: repeat(2,1fr); gap: 26px; margin-top: 50px; }
    .proj { display:flex; flex-direction:column; overflow:hidden; padding:0; }
    .proj .cover { aspect-ratio: 16/9; position: relative; overflow:hidden; border-bottom:1px solid var(--border); }
    .proj .cover svg { width:100%; height:100%; display:block; transition: transform .5s ease; }
    .proj:hover .cover svg { transform: scale(1.05); }
    .proj-body { padding: 24px 26px 26px; display:flex; flex-direction:column; flex:1; }
    .proj-tags { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:14px; }
    .proj-tags span { font-family:'JetBrains Mono'; font-size:11px; color: var(--faint); border:1px solid var(--border); padding:3px 8px; border-radius:6px; }
    .proj h3 { font-size: 20px; margin-bottom: 10px; }
    .proj p { color: var(--muted); font-size: 14.5px; flex:1; margin-bottom: 18px; }
    .proj-links { display:flex; gap:10px; flex-wrap:wrap; }
    .proj-links a { font-size: 13.5px; font-weight:600; display:inline-flex; align-items:center; gap:7px; padding:9px 14px; border-radius:10px; border:1px solid var(--border-strong); transition: all .25s; }
    .proj-links a:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-2px); }
    .proj-links a.solid { background: var(--accent); color:#1a1205; border-color: var(--accent); }
    .proj-links a.solid:hover { color:#1a1205; box-shadow: 0 10px 24px -10px rgba(255,180,84,.5); }

    /* ===== ACHIEVEMENT ===== */
    .ach { display:flex; gap:28px; align-items:center; margin-top: 50px; }
    .ach .medal { flex-shrink:0; width:120px; height:120px; border-radius:24px; display:grid; place-items:center; font-size:48px; color: var(--accent); background: var(--accent-soft); border:1px solid rgba(255,180,84,.3); }
    .ach h3 { font-size: 24px; margin-bottom: 6px; }
    .ach .co { color: var(--accent-2); font-weight:600; margin-bottom:10px; }
    .ach p { color: var(--muted); max-width: 720px; }

    /* ===== CONTACT ===== */
    .contact { text-align:center; }
    .contact .big { font-size: clamp(36px,6vw,68px); margin: 14px 0 18px; }
    .contact .big a { background: linear-gradient(120deg,#fff,var(--accent)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; transition: opacity .2s; }
    .contact .big a:hover { opacity:.8; }
    .contact-meta { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; margin-top: 30px; }
    .cmeta { display:inline-flex; align-items:center; gap:10px; padding:12px 18px; border:1px solid var(--border); border-radius:12px; background: var(--surface); color: var(--muted); font-size:14px; transition: all .25s; }
    .cmeta:hover { border-color: var(--accent); color: var(--text); transform: translateY(-3px); }
    .cmeta i { color: var(--accent); }

    /* ===== FOOTER ===== */
    footer { border-top:1px solid var(--border); padding: 40px 0; }
    .foot-inner { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:20px; }
    .foot-inner p { color: var(--faint); font-size: 13.5px; font-family:'JetBrains Mono'; }
    .foot-socials { display:flex; gap:14px; }
    .foot-socials a { color: var(--muted); font-size: 18px; transition: color .2s, transform .2s; }
    .foot-socials a:hover { color: var(--accent); transform: translateY(-2px); }

    .scroll-down { position:absolute; bottom: 30px; left: 50%; transform: translateX(-50%); color: var(--faint); font-family:'JetBrains Mono'; font-size:11px; letter-spacing:.15em; text-transform:uppercase; display:flex; flex-direction:column; align-items:center; gap:8px; }
    .scroll-down .mouse { width:22px; height:34px; border:2px solid var(--faint); border-radius:12px; display:flex; justify-content:center; padding-top:6px; }

    function useReveal() {
      useEffect(() => {
        const els = document.querySelectorAll(".reveal");
        if (!("IntersectionObserver" in window)) { els.forEach(e => e.classList.add("in")); return; }
        const io = new IntersectionObserver((entries) => {
          entries.forEach((en) => { if (en.isIntersecting) { en.target.classList.add("in"); io.unobserve(en.target); } });
        }, { threshold: 0.12 });
        els.forEach((e) => io.observe(e));
        return () => io.disconnect();
      });
    }

    function useTyped(words, speed = 95, back = 45, hold = 1600) {
      const [txt, setTxt] = useState("");
      const i = useRef(0); const j = useRef(0); const del = useRef(false);
      useEffect(() => {
        let t;
        const tick = () => {
          const w = words[i.current % words.length];
          if (!del.current) {
            setTxt(w.slice(0, j.current + 1)); j.current++;
            if (j.current === w.length) { del.current = true; t = setTimeout(tick, hold); return; }
          } else {
            setTxt(w.slice(0, j.current - 1)); j.current--;
            if (j.current === 0) { del.current = false; i.current++; }
          }
          t = setTimeout(tick, del.current ? back : speed);
        };
        t = setTimeout(tick, speed);
        return () => clearTimeout(t);
      }, []);
      return txt;
    }

    function useScrollSpy(ids) {

          entries.forEach((e) => { if (e.isIntersecting) setActive(e.target.id); });
        }, { rootMargin: "-45% 0px -50% 0px" });
        ids.forEach((id) => { const el = document.getElementById(id); if (el) io.observe(el); });
        return () => io.disconnect();
      }, []);
      return active;
    }

                    {x.current && <span className="tl-tag">● Current</span>}
                  </div>
                  <div className="tl-co">{x.company}</div>
                  <div className="tl-date">{x.date}</div>
                  <ul className="tl-list">{x.points.map((p,i)=>(<li key={i}>{p}</li>))}</ul>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function Skills() {
      return (
        <section id="skills">
          <div className="wrap">
            <div className="reveal"><div className="eyebrow">03 · Skills</div>
            <h2 className="sec-title">My toolbox</h2>
            <p className="sec-sub">The technologies I reach for to design, build and ship full-stack products.</p></div>
            <div className="skill-cats">
              {SKILLS.map((c,k)=>(
                <div className="card skill-cat reveal" key={k}>
                  <h4><i className={c.icon}></i> {c.cat}</h4>
                  <div className="chips">
                    {c.items.map((it,i)=>(
                      <span className="chip" key={i}>
                        {it.d ? <i className={it.d + (it.light ? " di" : "")}></i> : <i className={it.fa} style={{color:"var(--accent)"}}></i>}
                        {it.n}
                      </span>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function Projects() {
      return (
        <section id="projects">
          <div className="wrap">
            <div className="reveal"><div className="eyebrow">04 · Projects</div>
            <h2 className="sec-title">Selected work</h2>
            <p className="sec-sub">A mix of production SaaS platforms, APIs and frontend builds.</p></div>
            <div className="proj-grid">
              {PROJECTS.map((p,k)=>(
                <article className="card proj reveal" key={k}>
                  <div className="cover"><ProjectCover p={p} /></div>
                  <div className="proj-body">
                    <div className="proj-tags">{p.tags.map(t=>(<span key={t}>{t}</span>))}</div>
                    <h3>{p.title}</h3>
                    <p>{p.desc}</p>
                    <div className="proj-links">
                      {p.links.map((l,i)=>(
                        <a key={i} href={l.href} target="_blank" rel="noopener" className={l.solid ? "solid" : ""}>
                          <i className={l.icon}></i> {l.label}
                        </a>
                      ))}
                    </div>
                  </div>
                </article>
              ))}
            </div>
          </div>
        </section>
      );
    }

    function Achievements() {
      return (
        <section id="achievements">
          <div className="wrap">
            <div className="reveal"><div className="eyebrow">05 · Awards</div>
            <h2 className="sec-title">Recognition</h2></div>
            <div className="card ach reveal">
              <div className="medal"><i className="fa-solid fa-award"></i></div>
              <div>
                <h3>Achiever Award</h3>
                <div className="co">Tech Vaseegrah</div>
                <p>Recognized for technical excellence, rapid execution, and leadership in delivering software solutions — contributing significantly to integrating diverse technologies and steering the team toward effective delivery.</p>
              </div>
            </div>
          </div>
        </section>
      );
    }

    function Contact() {
      return (
        <section id="contact" className="contact">
          <div className="wrap">
            <div className="reveal"><div className="eyebrow" style={{justifyContent:"center"}}>06 · Contact</div>
            <p className="sec-sub" style={{margin:"0 auto"}}>Have a project, role, or idea in mind? Let's talk.</p>
            <div className="big"><a href={"mailto:"+PROFILE.email}>{PROFILE.email}</a></div></div>
            <div className="contact-meta reveal">
              <a className="cmeta" href={"mailto:"+PROFILE.email}><i className="fa-solid fa-envelope"></i> {PROFILE.email}</a>
              <a className="cmeta" href={"tel:"+PROFILE.phoneRaw}><i className="fa-solid fa-phone"></i> {PROFILE.phone}</a>
              <span className="cmeta"><i className="fa-solid fa-location-dot"></i> {PROFILE.location}</span>
            </div>
          </div>
        </section>
      );
    }

    function Footer() {
      return (
        <footer>
          <div className="wrap foot-inner">
            <p>© {new Date().getFullYear()} Hari Prasanth · Built with React</p>
            <div className="foot-socials">
              <a href={PROFILE.socials.github} target="_blank" rel="noopener" aria-label="GitHub"><i className="fa-brands fa-github"></i></a>
              <a href={PROFILE.socials.linkedin} target="_blank" rel="noopener" aria-label="LinkedIn"><i className="fa-brands fa-linkedin-in"></i></a>
              <a href={PROFILE.socials.medium} target="_blank" rel="noopener" aria-label="Medium"><i className="fa-brands fa-medium"></i></a>
            </div>
          </div>
        </footer>
      );
    }

    function App() {
      useReveal();
      const active = useScrollSpy(NAV.map(n=>n.id));
      return (
        <React.Fragment>
          <Nav active={active} />
          <main>
            <Hero /><About /><Experience /><Skills /><Projects /><Achievements /><Contact />
          </main>
          <Footer />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
